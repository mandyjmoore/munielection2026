<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ballot box + checked ballot, in the dashboard's own palette:
       bg #0f172a, accent #3b82f6, green #22c55e -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- ballot paper, tilted, dropping toward the slot -->
  <g transform="rotate(-8 32 17)">
    <rect x="23" y="5" width="18" height="24" rx="2.5" fill="#f1f5f9"/>
    <path d="M27.5 16l3.6 4 6.5-8" fill="none" stroke="#22c55e" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- box body (drawn over the paper so it appears to enter the slot) -->
  <rect x="9" y="27" width="46" height="28" rx="4.5" fill="#3b82f6"/>
  <!-- slot -->
  <rect x="19" y="30" width="26" height="4.5" rx="2.25" fill="#0f172a"/>
</svg>
