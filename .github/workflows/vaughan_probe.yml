name: Vaughan access probe

# One-off diagnostic: can a real headless browser in CI read Vaughan's
# elections landing page (which embeds the Nominated Candidates list)?
# Plain Playwright Chromium, no stealth/evasion — if the WAF blocks a
# normal browser, we accept that and stay on the local browser route.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Probe Vaughan elections landing page
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              resp = page.goto("https://www.vaughan.ca/council/elections",
                               timeout=60000, wait_until="domcontentloaded")
              print("HTTP status:", resp.status)
              print("Final URL:  ", page.url)
              html = page.content()
              print("Page length:", len(html))
              print("Has 'Nominated Candidates':", "Nominated Candidates" in html)
              print("Has 'Del Duca':", "Del Duca" in html)
              print("Has 'Local and Regional Councillor':", "Local and Regional Councillor" in html)
              browser.close()
          EOF
