name: Update Election Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/main.py

      - name: Commit and push updated data
        run: |
          git config user.name "election-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update: election data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
